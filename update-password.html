<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Password — Keen</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e1a; --card: #111827; --border: rgba(255,255,255,0.08);
  --border-accent: rgba(56,189,248,0.25); --text-1: #f1f5f9; --text-2: #94a3b8;
  --text-3: #64748b; --accent: #38bdf8; --green: #4ade80; --red: #f87171;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text-1); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
.logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: .04em; margin-bottom: 28px; text-align: center; }
h1 { font-size: 20px; font-weight: 800; color: var(--text-1); margin-bottom: 6px; text-align: center; }
.sub { font-size: 13px; color: var(--text-2); text-align: center; margin-bottom: 28px; }
label { display: block; font-size: 12px; font-weight: 700; color: var(--text-2); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text-1); font-size: 14px; font-family: var(--sans); outline: none; margin-bottom: 16px; }
input:focus { border-color: var(--border-accent); background: rgba(56,189,248,0.05); }
.btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--accent); color: #0a0e1a; font-size: 14px; font-weight: 800; font-family: var(--sans); cursor: pointer; margin-top: 4px; }
.btn:hover { background: #7dd3fc; }
.btn:disabled { opacity: .5; cursor: default; }
.msg { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
.msg.error { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2); color: var(--red); display: block; }
.msg.success { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.2); color: var(--green); display: block; }
.footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-3); }
.footer-link a { color: var(--accent); text-decoration: none; }
.invalid { text-align: center; padding: 20px 0; }
.invalid p { color: var(--text-2); font-size: 14px; margin-bottom: 16px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="logo">KEEN.</div>

  <div id="invalid-state" class="invalid" style="display:none">
    <p>This reset link is invalid or has expired.</p>
    <a href="/reset-password" style="color:var(--accent);text-decoration:none;font-weight:700">Request a new link →</a>
  </div>

  <div id="form-state">
    <h1>Set new password</h1>
    <p class="sub">Choose a new password for your account.</p>

    <form id="update-form">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="8+ characters" required minlength="8" autocomplete="new-password">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password" required minlength="8" autocomplete="new-password">
      <button class="btn" type="submit" id="submit-btn">Update Password</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <div class="footer-link"><a href="/login">← Back to Sign In</a></div>
</div>

<script src="/keen-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var client = supabase.createClient(window.KEEN_CONFIG.SUPABASE_URL, window.KEEN_CONFIG.SUPABASE_ANON_KEY);

// Supabase puts the session tokens in the URL hash after redirect
client.auth.onAuthStateChange(function(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    // Valid reset link — show the form
    document.getElementById('form-state').style.display = 'block';
    document.getElementById('invalid-state').style.display = 'none';
  }
});

// If no recovery event fires, show invalid state after a short delay
setTimeout(function() {
  client.auth.getSession().then(function(r) {
    if (!r.data || !r.data.session) {
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    }
  });
}, 1000);

document.getElementById('update-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var password = document.getElementById('password').value;
  var confirm  = document.getElementById('confirm').value;
  var btn      = document.getElementById('submit-btn');
  var msg      = document.getElementById('msg');

  if (password !== confirm) {
    msg.className = 'msg error';
    msg.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';
  msg.className = 'msg';
  msg.textContent = '';

  var result = await client.auth.updateUser({ password: password });

  if (result.error) {
    msg.className = 'msg error';
    msg.textContent = result.error.message;
    btn.disabled = false;
    btn.textContent = 'Update Password';
    return;
  }

  msg.className = 'msg success';
  msg.textContent = 'Password updated. Redirecting…';
  btn.textContent = 'Done';
  setTimeout(function() { window.location.href = '/dashboard'; }, 1500);
});
</script>
</body>
</html>
